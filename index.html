<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hive Match</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #0d0d1a; color: #f0a500; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 16px; box-sizing: border-box; }
        #header { text-align: center; margin-bottom: 10px; }
        h1 { margin: 0 0 4px; font-size: 1.8rem; }
        #board-container { background-color: #1a1a2e; border-radius: 12px; padding: 8px; display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; width: min(calc(100vw - 32px), 380px); box-sizing: border-box; }
        .tile { background-color: #333; color: white; border-radius: 8px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: bold; cursor: pointer; position: relative; user-select: none; box-sizing: border-box; border: 2px solid transparent; transition: border 150ms, transform 150ms; }
        .tile[data-type="0"] { background-color: #e74c3c; }
        .tile[data-type="1"] { background-color: #3498db; }
        .tile[data-type="2"] { background-color: #f1c40f; color: #333; }
        .tile[data-type="3"] { background-color: #2ecc71; }
        .tile[data-type="4"] { background-color: #9b59b6; }
        .tile.selected { border: 2px solid white; transform: scale(1.08); }
        .tile.target { border: 2px solid #f0a500; box-shadow: 0 0 10px #f0a500; }
        .tile.bomb { background-color: #444; }
        .tile.rainbow { background: linear-gradient(135deg, #e74c3c, #f1c40f, #2ecc71, #3498db, #9b59b6); }
        .badge { position: absolute; top: 1px; right: 3px; font-size: 0.65rem; color: #f0a500; }
        #stats { margin: 8px 0; font-size: 0.9rem; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); color: #f0a500; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; gap: 12px; text-align: center; padding: 24px; }
        #overlay.visible { display: flex; }
        #overlay h2 { margin: 0; font-size: 2rem; }
        #overlay .stars { font-size: 2rem; }
        .gold-btn { background: #f0a500; border: none; padding: 12px 28px; cursor: pointer; color: #1a1a2e; font-weight: bold; font-size: 1rem; border-radius: 8px; margin-top: 4px; }
        #countdown { font-size: 0.85rem; opacity: 0.8; }
        @keyframes tile-clear { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.5); } }
        @keyframes tile-fall { from { transform: translateY(-60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes tile-invalid { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
        .clearing { animation: tile-clear 0.3s ease forwards; }
        .falling { animation: tile-fall 0.3s ease-out forwards; }
        .invalid-swap { animation: tile-invalid 0.25s ease; }
    </style>
</head>
<body>
    <div id="header">
        <h1>🐝 HIVE MATCH</h1>
        <div>Day <span id="day-number"></span> · 🔥 <span id="streak">0</span> day streak</div>
    </div>
    <div id="stats">Moves: <span id="moves-used">0</span>/45 · Targets: <span id="targets-remaining">5</span>/5</div>
    <div id="board-container"></div>
    <div id="overlay">
        <h2 id="overlay-title">🐝 Hive Match</h2>
        <div id="overlay-day"></div>
        <div class="stars" id="overlay-stars"></div>
        <div id="overlay-result"></div>
        <button class="gold-btn" id="share-button">Share Result</button>
        <div id="countdown"></div>
        <div id="streak-display"></div>
    </div>
    <script>
        // === PRNG ===
        function mulberry32(a) {
            return function() {
                a |= 0; a = a + 0x6D2B79F5 | 0;
                var t = Math.imul(a ^ a >>> 15, 1 | a);
                t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }
        function getTodayUTC() { return new Date().toISOString().split('T')[0]; }
        function getSeed() { return parseInt(getTodayUTC().replace(/-/g,'')); }
        function getDayNumber() {
            const epoch = new Date('2026-04-30T00:00:00Z');
            const today = new Date(getTodayUTC() + 'T00:00:00Z');
            return Math.max(1, Math.floor((today - epoch) / 86400000) + 1);
        }
        function getStars(moves) {
            if (moves <= 20) return '⭐⭐⭐';
            if (moves <= 30) return '⭐⭐';
            return '⭐';
        }

        // === STATE ===
        const COLS = 7, ROWS = 8, MAX_MOVES = 45, TARGET_COUNT = 5;
        const TILE_SYMBOLS = ['●','■','▲','◆','⬡'];
        let board = [], targetSet = new Set(), movesUsed = 0, targetsCleared = 0;
        let selectedIdx = null, gameOver = false, inputLocked = false;
        let repPool = [], repIdx = 0;
        const rand = mulberry32(getSeed());

        // === BOARD GENERATION ===
        function generateBoard() {
            board = Array(COLS * ROWS).fill(0).map(() => Math.floor(rand() * TILE_SYMBOLS.length));
            // Remove pre-existing matches so board starts clean
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const idx = r * COLS + c;
                    const forbidden = new Set();
                    if (c >= 2 && board[idx-1] === board[idx-2]) forbidden.add(board[idx-1]);
                    if (r >= 2 && board[idx-COLS] === board[idx-2*COLS]) forbidden.add(board[idx-COLS]);
                    if (forbidden.has(board[idx])) {
                        let t = (board[idx] + 1) % TILE_SYMBOLS.length;
                        while (forbidden.has(t)) t = (t + 1) % TILE_SYMBOLS.length;
                        board[idx] = t;
                    }
                }
            }
            targetSet = new Set();
            // Place targets in rows 2-7 (not top 2 rows) so they're reachable
            while (targetSet.size < TARGET_COUNT) {
                const pos = Math.floor(rand() * (ROWS - 2) * COLS) + 2 * COLS;
                targetSet.add(pos);
            }
            repPool = Array(300).fill(0).map(() => Math.floor(rand() * TILE_SYMBOLS.length));
            repIdx = 0;
        }

        // === GAME LOGIC ===
        function findAllMatches() {
            const matches = new Set();
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const idx = r * COLS + c;
                    if (board[idx] === -1) continue;
                    if (c < COLS - 2 && board[idx] === board[idx+1] && board[idx] === board[idx+2]) {
                        matches.add(idx); matches.add(idx+1); matches.add(idx+2);
                    }
                    if (r < ROWS - 2 && board[idx] === board[idx+COLS] && board[idx] === board[idx+2*COLS]) {
                        matches.add(idx); matches.add(idx+COLS); matches.add(idx+2*COLS);
                    }
                }
            }
            return matches;
        }

        // Returns true if move was valid (had matches), false if invalid
        function tryMatch(swapIdx1, swapIdx2) {
            const matches = findAllMatches();
            if (matches.size === 0) {
                // Swap back — invalid move
                [board[swapIdx1], board[swapIdx2]] = [board[swapIdx2], board[swapIdx1]];
                // Animate shake, then re-render the correct (reverted) state
                const tiles = document.querySelectorAll('.tile');
                [swapIdx1, swapIdx2].forEach(i => {
                    tiles[i].classList.add('invalid-swap');
                    tiles[i].addEventListener('animationend', () => tiles[i].classList.remove('invalid-swap'), { once: true });
                });
                setTimeout(() => renderBoard(), 280);
                return false;
            }
            movesUsed++;
            processMatches(matches, true);
            return true;
        }

        function processMatches(matches, animate) {
            inputLocked = true;
            matches.forEach(idx => {
                if (targetSet.has(idx)) { targetSet.delete(idx); targetsCleared++; }
                board[idx] = -1;
                if (animate) {
                    const tiles = document.querySelectorAll('.tile');
                    if (tiles[idx]) tiles[idx].classList.add('clearing');
                }
            });
            setTimeout(() => {
                applyGravity();
                renderBoard();
                setTimeout(() => {
                    const next = findAllMatches();
                    if (next.size > 0) {
                        processMatches(next, true);
                    } else {
                        inputLocked = false;
                        checkGameEnd();
                    }
                }, 350);
            }, 300);
        }

        function applyGravity() {
            for (let c = 0; c < COLS; c++) {
                let empty = 0;
                for (let r = ROWS - 1; r >= 0; r--) {
                    const idx = r * COLS + c;
                    if (board[idx] === -1) {
                        empty++;
                    } else if (empty > 0) {
                        board[idx + empty * COLS] = board[idx];
                        board[idx] = -1;
                    }
                }
                for (let r = 0; r < empty; r++) {
                    board[r * COLS + c] = repPool[repIdx++ % repPool.length];
                }
            }
        }

        function checkGameEnd() {
            if (targetsCleared >= TARGET_COUNT) win();
            else if (movesUsed >= MAX_MOVES) lose();
        }

        function win() {
            gameOver = true;
            const stars = getStars(movesUsed);
            saveTodayResult({ stars, moves: movesUsed, won: true });
            updateStreak(true);
            showOverlay(true, stars);
        }

        function lose() {
            gameOver = true;
            saveTodayResult({ stars: '💀', moves: movesUsed, won: false });
            updateStreak(false);
            showOverlay(false, '💀');
        }

        // === PERSISTENCE ===
        function saveTodayResult(result) {
            localStorage.setItem('hm_todayResult', JSON.stringify({ date: getTodayUTC(), ...result }));
        }

        function loadTodayResult() {
            try {
                const r = JSON.parse(localStorage.getItem('hm_todayResult') || 'null');
                return r && r.date === getTodayUTC() ? r : null;
            } catch { return null; }
        }

        function updateStreak(won) {
            const today = getTodayUTC();
            const yesterday = new Date(); yesterday.setUTCDate(yesterday.getUTCDate() - 1);
            const yesterdayStr = yesterday.toISOString().split('T')[0];
            let lastPlayed = localStorage.getItem('hm_lastPlayed') || '';
            let streak = parseInt(localStorage.getItem('hm_streak') || '0');
            let maxStreak = parseInt(localStorage.getItem('hm_maxStreak') || '0');
            let total = parseInt(localStorage.getItem('hm_total') || '0');

            if (lastPlayed === yesterdayStr) streak = won ? streak + 1 : 0;
            else if (lastPlayed !== today) streak = won ? 1 : 0;
            if (won) maxStreak = Math.max(maxStreak, streak);

            localStorage.setItem('hm_lastPlayed', today);
            localStorage.setItem('hm_streak', streak);
            localStorage.setItem('hm_maxStreak', maxStreak);
            localStorage.setItem('hm_total', total + 1);
            document.getElementById('streak').textContent = streak;
        }

        // === UI ===
        function renderBoard() {
            const container = document.getElementById('board-container');
            container.innerHTML = '';
            board.forEach((tile, idx) => {
                const div = document.createElement('div');
                div.className = 'tile';
                if (tile !== -1) {
                    div.dataset.type = tile;
                    div.textContent = TILE_SYMBOLS[tile];
                    if (tile === 2) div.style.color = '#333'; // yellow needs dark text
                    if (targetSet.has(idx)) {
                        div.classList.add('target');
                        const badge = document.createElement('span');
                        badge.className = 'badge'; badge.textContent = '★';
                        div.appendChild(badge);
                    }
                    div.onclick = () => selectTile(idx);
                }
                container.appendChild(div);
            });
            document.getElementById('moves-used').textContent = movesUsed;
            document.getElementById('targets-remaining').textContent = TARGET_COUNT - targetsCleared;
        }

        function selectTile(idx) {
            if (gameOver || inputLocked) return;
            const tiles = document.querySelectorAll('.tile');
            if (selectedIdx === null) {
                selectedIdx = idx;
                if (tiles[idx]) tiles[idx].classList.add('selected');
            } else {
                const prev = selectedIdx;
                // Deselect first
                if (tiles[prev]) tiles[prev].classList.remove('selected');
                selectedIdx = null;
                if (prev === idx) return; // tapped same tile
                if (isAdjacent(prev, idx)) {
                    [board[prev], board[idx]] = [board[idx], board[prev]];
                    renderBoard();
                    tryMatch(prev, idx);
                } else {
                    // Select new tile instead
                    selectedIdx = idx;
                    if (tiles[idx]) tiles[idx].classList.add('selected');
                }
            }
        }

        function isAdjacent(idx1, idx2) {
            const r1 = Math.floor(idx1/COLS), c1 = idx1%COLS;
            const r2 = Math.floor(idx2/COLS), c2 = idx2%COLS;
            return (Math.abs(r1-r2)===1 && c1===c2) || (Math.abs(c1-c2)===1 && r1===r2);
        }

        function showOverlay(won, stars) {
            document.getElementById('overlay').classList.add('visible');
            document.getElementById('overlay-title').textContent = won ? '🎉 You Win!' : '💀 Game Over';
            document.getElementById('overlay-day').textContent = `Day ${getDayNumber()}`;
            document.getElementById('overlay-stars').textContent = stars;
            document.getElementById('overlay-result').textContent = won
                ? `Solved in ${movesUsed} moves!`
                : `${targetsCleared}/${TARGET_COUNT} targets cleared`;
            document.getElementById('share-button').onclick = shareResult;
            const streakVal = localStorage.getItem('hm_streak') || '0';
            const maxVal = localStorage.getItem('hm_maxStreak') || '0';
            document.getElementById('streak-display').textContent = `🔥 ${streakVal} day streak · 🏆 Best: ${maxVal}`;
            startCountdown();
        }

        function shareResult() {
            const today = loadTodayResult();
            const stars = today ? today.stars : (targetsCleared >= TARGET_COUNT ? getStars(movesUsed) : '💀');
            const dayN = getDayNumber();
            const text = targetsCleared >= TARGET_COUNT
                ? `🐝 Hive Match — Day ${dayN}\n${stars} Solved in ${movesUsed} moves!\nPlay: https://thehivemakes.github.io/hive-match/`
                : `🐝 Hive Match — Day ${dayN}\n💀 Out of moves (${targetsCleared}/${TARGET_COUNT} targets)\nPlay: https://thehivemakes.github.io/hive-match/`;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('share-button');
                btn.textContent = '✅ Copied!';
                setTimeout(() => { btn.textContent = 'Share Result'; }, 2000);
            }).catch(() => { alert(text); });
        }

        let countdownInterval = null;
        function startCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            function tick() {
                const now = new Date();
                const midnight = new Date(getTodayUTC() + 'T00:00:00Z');
                midnight.setUTCDate(midnight.getUTCDate() + 1);
                const diff = midnight - now;
                const h = String(Math.floor(diff/3600000)).padStart(2,'0');
                const m = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
                const s = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
                document.getElementById('countdown').textContent = `Next puzzle in ${h}:${m}:${s}`;
            }
            tick();
            countdownInterval = setInterval(tick, 1000);
        }

        function init() {
            const streak = parseInt(localStorage.getItem('hm_streak') || '0');
            document.getElementById('day-number').textContent = getDayNumber();
            document.getElementById('streak').textContent = streak;

            const prior = loadTodayResult();
            if (prior) {
                // Already played today — show result without allowing replay
                generateBoard();
                renderBoard();
                gameOver = true;
                movesUsed = prior.moves;
                targetsCleared = prior.won ? TARGET_COUNT : 0;
                showOverlay(prior.won, prior.stars);
                return;
            }
            generateBoard();
            renderBoard();
        }

        init();
    </script>
</body>
</html>
